version: 2
updates:

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    versioning-strategy: increase

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      dev-dependencies:
        dependency-type: development
    versioning-strategy: increase

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
    groups:
      dev-dependencies:
        dependency-type: development
    versioning-strategy: increase
